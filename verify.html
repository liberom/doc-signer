<!DOCTYPE html>
<html lang='en'>
<head>
  <meta charset='UTF-8' />
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <title>PDF Signer — Verification</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 0;
      color: #1a1a1a;
    }

    h1 { font-size: 1.55rem; margin-bottom: 0.35rem; }
    .subtitle { color: #555; margin-bottom: 1.6rem; font-size: 0.9rem; }

    .card {
      background: #fff;
      border-radius: 14px;
      padding: 1.8rem 2rem 2.2rem;
      box-shadow: 0 2px 14px rgba(0,0,0,0.09);
      width: 100%;
      max-width: 600px;
      margin: 20px auto;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      text-align: center;
    }

    .upload-zone {
      border: 2px dashed #c7d2fe;
      border-radius: 10px;
      padding: 1.8rem 1.5rem;
      text-align: center;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #2563eb;
      background: #eff6ff;
    }
    .upload-zone p { font-size: 0.88rem; color: #6b7280; margin-top: 0.4rem; }
    .upload-icon { font-size: 2.4rem; display: block; margin-bottom: 0.3rem; }
    input[type='file'] { display: none; }

    .pin-field { background: #fffbf0; border-color: #f59e0b; }
    .pin-field:focus { border-color: #d97706; }
    .pin-hint { font-size: 0.72rem; color: #92400e; font-weight: 400; }

    #urlBanner {
      display: none;
      background: #fffbeb;
      border: 1.5px solid #f59e0b;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.8rem;
      color: #92400e;
      line-height: 1.65;
      word-break: break-all;
    }
    #urlBanner.visible { display: block; }
    #urlBanner strong { display: block; margin-bottom: 0.3rem; color: #78350f; }

    .meta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    .meta-table th {
      text-align: left;
      color: #6b7280;
      font-weight: 600;
      padding: 0.28rem 0.5rem 0.28rem 0;
      border-bottom: 1px solid #e5e7eb;
      width: 40%;
    }
    .meta-table td {
      padding: 0.28rem 0;
      border-bottom: 1px solid #e5e7eb;
      word-break: break-all;
    }

    .seal-block {
      font-size: 0.72rem;
      color: #374151;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.7rem 1rem;
      word-break: break-all;
      line-height: 1.65;
    }
    .seal-row { display: flex; gap: 0.5rem; align-items: baseline; margin: 0.25rem 0; }
    .seal-label { flex-shrink: 0; font-weight: 700; min-width: 110px; }
    .seal-value { word-break: break-all; }
    .match-icon { font-size: 0.85rem; margin-left: 0.35rem; }
    .match-yes  { color: #16a34a; }
    .match-no   { color: #dc2626; }
    .match-null { color: #9ca3af; }

    #resultBanner {
      display: none;
      border-radius: 12px;
      padding: 1.2rem;
      text-align: center;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      animation: bannerPop 0.3s ease-out;
    }
    #resultBanner.visible { display: flex; }
    @keyframes bannerPop {
      from { transform: scale(0.85); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .banner-green { background: #f0fdf4; border: 2px solid #16a34a; }
    .banner-red   { background: #fef2f2; border: 2px solid #dc2626; }

    .result-icon  { font-size: 2.8rem; }
    .result-label { font-size: 1.5rem; font-weight: 800; letter-spacing: 0.06em; }
    .result-sub   { font-size: 0.83rem; opacity: 0.85; }
    .banner-green .result-icon,
    .banner-green .result-label { color: #16a34a; }
    .banner-green .result-sub    { color: #15803d; }
    .banner-red .result-icon,
    .banner-red .result-label { color: #dc2626; }
    .banner-red .result-sub    { color: #b91c1c; }

    .btn-row { display: flex; gap: 0.7rem; }

    button {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 0.62rem 1.4rem;
      border-radius: 8px;
      font-size: 0.92rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      flex: 1;
    }
    button:hover:not(:disabled) { background: #1d4ed8; }
    button:disabled { background: #93c5fd; cursor: not-allowed; }
    button.secondary { background: #6b7280; }
    button.secondary:hover:not(:disabled) { background: #4b5563; }

    .divider { border: none; border-top: 1px solid #e5e7eb; }
    .label-section { font-size: 0.78rem; font-weight: 700; color: #374151; letter-spacing: 0.04em; }
  </style>
</head>
<body>

  <h1>Verify Signed PDF</h1>
  <p class='subtitle'>Enter the same PIN used at signing to verify the Digital Seal</p>

  <div class='card'>

    <!-- Target data from URL query string -->
    <div id='urlBanner'>
      <strong>Target Verification Data (from URL)</strong>
      <div id='urlData'></div>
    </div>

    <!-- Upload zone -->
    <div class='upload-zone' id='uploadZone'>
      <span class='upload-icon'>📄</span>
      <strong>Click or drag a signed PDF here</strong>
      <p id='fileNameEl'>No file selected</p>
    </div>
    <input type='file' id='fileInput' accept='.pdf,application/pdf' />

    <hr class='divider' />
    <div class='label-section'>Extracted Metadata</div>

    <table class='meta-table' id='metaTable' style='display:none;'>
      <tbody>
        <tr><th>Signer Name</th>    <td id='metaName'>—</td></tr>
        <tr><th>Email</th>          <td id='metaEmail'>—</td></tr>
        <tr><th>Timestamp</th>      <td id='metaTime'>—</td></tr>
        <tr><th>Producer</th>       <td id='metaProducer'>—</td></tr>
      </tbody>
    </table>

    <!-- PIN input -->
    <label style='gap:0.3rem;'>
      Signer PIN
      <input type='password' id='fPin' class='pin-field' placeholder='Enter the same PIN used to sign' autocomplete='off' />
      <span class='pin-hint'>Required to re-calculate the Digital Seal</span>
    </label>

    <!-- Seal comparison -->
    <div id='sealBlock' style='display:none;'>
      <div class='seal-block'>
        <div class='seal-row'>
          <span class='seal-label'>Stored Seal</span>
          <span class='seal-value' id='storedSeal'>—</span>
          <span class='match-icon match-null' id='matchMeta'>—</span>
        </div>
        <div class='seal-row'>
          <span class='seal-label'>Recalc. Seal</span>
          <span class='seal-value' id='calcSeal'>—</span>
          <span class='match-icon match-null' id='matchFile'>—</span>
        </div>
        <div class='seal-row' id='urlSealRow' style='display:none;'>
          <span class='seal-label'>URL Param Seal</span>
          <span class='seal-value' id='urlSeal'>—</span>
          <span class='match-icon match-null' id='matchUrl'>—</span>
        </div>
      </div>
    </div>

    <!-- Result -->
    <div id='resultBanner'>
      <div class='result-icon' id='resultIcon'>✓</div>
      <div class='result-label' id='resultLabel'>VERIFIED</div>
      <div class='result-sub'  id='resultSub'></div>
    </div>

    <!-- Actions -->
    <div class='btn-row'>
      <button id='verifyBtn' disabled>Verify Integrity</button>
      <button id='clearBtn' class='secondary'>Clear</button>
    </div>

  </div>

  <!-- pdf-lib (UMD) -->
  <script src='https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js'></script>

  <script>
    /* ════════════════════════════════════════════════════════════
       1. Parse URL query string
       If 'pin' is found → auto-fill PIN field.
       If 'seal' is found → show "Target Verification Data" banner.
       If both pin+seal are present → auto-run verification after upload.
    ════════════════════════════════════════════════════════════ */
    const urlParams   = new URLSearchParams(window.location.search);
    const targetSeal  = urlParams.get('seal')  || '';
    const targetName  = urlParams.get('name')  || '';
    const targetEmail = urlParams.get('email') || '';
    const targetPin   = urlParams.get('pin')   || '';

    if (targetSeal || targetPin || targetName || targetEmail) {
      const parts = [];
      if (targetSeal)  parts.push(`Seal: ${targetSeal.slice(0, 16)}\u2026${targetSeal.slice(-8)}`);
      if (targetPin)   parts.push(`PIN:  [provided in URL]`);
      if (targetName)  parts.push(`Name: ${targetName}`);
      if (targetEmail) parts.push(`Email: ${targetEmail}`);
      document.getElementById('urlData').textContent = parts.join('  |  ');
      document.getElementById('urlBanner').classList.add('visible');
    }

    /* ════════════════════════════════════════════════════════════
       2. Guard: confirm PDFLib loaded
    ════════════════════════════════════════════════════════════ */
    (function checkLib() {
      if (typeof PDFLib === 'undefined')
        throw new Error('pdf-lib not found. Check network connection.');
      if (!PDFLib.PDFDocument || !PDFLib.rgb)
        throw new Error('pdf-lib missing expected exports.');
    }());

    /* ════════════════════════════════════════════════════════════
       3. HMAC-SHA256 helpers (identical formula to signing page)
    ════════════════════════════════════════════════════════════ */
    function bufferToHex(buffer) {
      return Array.from(new Uint8Array(buffer), b =>
        b.toString(16).padStart(2, '0')
      ).join('');
    }

    /* ── Normalize helper: trim and handle empty values ──────── */
    const normalize = (val) => (val ? String(val).trim() : '');

    async function importPinKey(pin) {
      // Hash PIN to fixed-length key material, then import as HMAC-SHA256 key.
      const pinBytes  = new TextEncoder().encode(pin);
      const keyDigest = await crypto.subtle.digest('SHA-256', pinBytes);
      return crypto.subtle.importKey(
        'raw',
        keyDigest,
        { name: 'HMAC', hash: 'SHA-256' },
        false,   // not extractable
        ['sign']
      );
    }

    /* ── Re-calculate Digital Seal ───────────────────────────────
       HMAC-SHA256( PIN, standardized metadata string )   */
    async function recalculateSeal(pin, data) {
      const key = await importPinKey(pin);
      
      // Standardized hash string: EXACT SAME format as signing
      const dataToHash = [
        normalize(data.name),
        normalize(data.email).toLowerCase(),
        normalize(data.organization),
        normalize(data.jobTitle),
        normalize(data.timestamp),
        normalize(data.documentId)
      ].join('|');

      console.log('DEBUG - Final Hash String (Verification):', dataToHash);

      // Encode to bytes and sign with HMAC-SHA256
      const textEncoder = new TextEncoder();
      const payload = textEncoder.encode(dataToHash);

      const signatureBuf = await crypto.subtle.sign('HMAC', key, payload);
      return bufferToHex(signatureBuf);
    }

    /* ════════════════════════════════════════════════════════════
       4. Parse Title into (name, utcTimestamp)
       Extracts timestamp as-is from title (raw ISO format stored in PDF)
       Updated to handle "Document Signed by " prefix
    ════════════════════════════════════════════════════════════ */
    function parseTitleForSignee(titleStr) {
      const marker = ' \u2014 signed ';
      const idx    = titleStr.lastIndexOf(marker);
      if (idx === -1) throw new Error('Title metadata missing " \u2014 signed " marker.');
      let name      = titleStr.slice(0, idx).trim();
      // Remove "Document Signed by " prefix if present
      if (name.startsWith('Document Signed by ')) {
        name = name.slice('Document Signed by '.length).trim();
      }
      const utcStr    = titleStr.slice(idx + marker.length).trim();
      // Store the timestamp AS-IS for HMAC verification - do NOT reformat
      return { name, utcTimestamp: utcStr };
    }

    /* ════════════════════════════════════════════════════════════
       5. UI element references
    ════════════════════════════════════════════════════════════ */
    const uploadZone   = document.getElementById('uploadZone');
    const fileInput     = document.getElementById('fileInput');
    const fileNameEl   = document.getElementById('fileNameEl');
    const fPin          = document.getElementById('fPin');
    const metaTable     = document.getElementById('metaTable');
    const metaName     = document.getElementById('metaName');
    const metaEmail    = document.getElementById('metaEmail');
    const metaTime     = document.getElementById('metaTime');
    const metaProducer = document.getElementById('metaProducer');
    const sealBlock    = document.getElementById('sealBlock');
    const storedSealEl = document.getElementById('storedSeal');
    const calcSealEl  = document.getElementById('calcSeal');
    const urlSealRow   = document.getElementById('urlSealRow');
    const urlSealEl    = document.getElementById('urlSeal');
    const matchMetaEl  = document.getElementById('matchMeta');
    const matchFileEl  = document.getElementById('matchFile');
    const matchUrlEl   = document.getElementById('matchUrl');
    const resultBanner = document.getElementById('resultBanner');
    const resultIcon   = document.getElementById('resultIcon');
    const resultLabel  = document.getElementById('resultLabel');
    const resultSub    = document.getElementById('resultSub');
    const verifyBtn    = document.getElementById('verifyBtn');
    const clearBtn     = document.getElementById('clearBtn');

    // State
    let pdfBytes    = null;   // cloned Uint8Array (for pdf-lib + later re-verification)
    let storedSeal  = null;   // from PDF Subject metadata (JSON)
    let parsedName  = null;
    let parsedEmail = null;
    let parsedTime  = null;
    let parsedOrganization = null;
    let parsedJobTitle = null;
    let parsedDocumentId = null;

    /* ── Pre-fill PIN from URL if provided ─────────────────────── */
    if (targetPin) {
      fPin.value = targetPin;
    }

    /* ── Drag-and-drop ─────────────────────────────────────────── */
    uploadZone.addEventListener('click', () => fileInput.click());
    uploadZone.addEventListener('dragover', e => {
      e.preventDefault();
      uploadZone.classList.add('drag-over');
    });
    uploadZone.addEventListener('dragleave', () =>
      uploadZone.classList.remove('drag-over')
    );
    uploadZone.addEventListener('drop', e => {
      e.preventDefault();
      uploadZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) { fileInput.files = e.dataTransfer.files; triggerLoad(file); }
    });

    fileInput.addEventListener('change', () => {
      const file = fileInput.files[0];
      if (file) triggerLoad(file);
    });

    /* ── Button guard ───────────────────────────────────────────── */
    function refreshBtn() {
      verifyBtn.disabled = !(
        pdfBytes !== null &&
        storedSeal !== null &&
        fPin.value.trim() !== ''
      );
    }

    fPin.addEventListener('input', refreshBtn);

    /* ════════════════════════════════════════════════════════════
       6. Load PDF — async function with proper await + try/catch.
       Creates two independent clones so pdf-lib and SubtleCrypto
       never share the same underlying ArrayBuffer reference.
    ════════════════════════════════════════════════════════════ */
    async function triggerLoad(file) {
      console.log('[Verify] triggerLoad called with file:', file);

      if (!file) {
        console.log('[Verify] No file provided — returning early.');
        return;
      }

      // Clear previous state
      pdfBytes    = null;
      storedSeal  = null;
      parsedName  = null;
      parsedEmail = null;
      parsedTime  = null;
      parsedOrganization = null;
      parsedJobTitle = null;
      parsedDocumentId = null;

      // Clear UI
      fileNameEl.textContent  = 'Loading…';
      metaTable.style.display = 'none';
      sealBlock.style.display = 'none';
      urlSealRow.style.display = 'none';
      storedSealEl.textContent = '—';
      calcSealEl.textContent   = '—';
      resultBanner.classList.remove('visible', 'banner-green', 'banner-red');
      verifyBtn.disabled = true;

      try {
        console.log('[Verify] Awaiting file.arrayBuffer()…');
        const rawBuffer = await file.arrayBuffer();
        console.log('[Verify] file.arrayBuffer() succeeded, byteLength:', rawBuffer.byteLength);

        // Debug: confirm buffer exists before slicing
        console.log('Buffer loaded:', rawBuffer);

        if (!rawBuffer || rawBuffer.byteLength === 0)
          throw new Error('File ArrayBuffer is empty. The file may be corrupted.');

        // ── Create two independent clones ─────────────────────────
        // Clone A → pdf-lib  (PDFDocument.load)
        // Clone B → pdfBytes (cached in memory; re-sliced at verify time)
        const cloneA = rawBuffer.slice(0);
        const cloneB = rawBuffer.slice(0);

        console.log('[Verify] Created two independent clones. A byteLength:', cloneA.byteLength);

        // Set pdfBytes to Clone B so it's available to runVerification later
        pdfBytes = new Uint8Array(cloneB);

        // ── Load PDF and extract metadata using Clone A ────────────
        console.log('[Verify] Loading PDF with pdf-lib…');
        const pdfDoc = await PDFLib.PDFDocument.load(cloneA);

        const title    = pdfDoc.getTitle()    || '';
        const producer = pdfDoc.getProducer() || '';
        
        // Raw Retrieval: Get Subject field ONLY (ignore Keywords to avoid confusion)
        const subjectRaw = pdfDoc.getSubject() || '';
        
        console.log('[Verify] Subject raw:', subjectRaw);
        
        // Parse from Subject field - THIS IS THE ONLY SOURCE OF TRUTH
        let factsData = null;
        
        if (!subjectRaw || !subjectRaw.trim().startsWith('{')) {
          throw new Error('No valid JSON found in Subject field. File may not have been signed with this tool.');
        }
        
        try {
          factsData = JSON.parse(subjectRaw);
          console.log('[Verify] Successfully parsed JSON from Subject field');
        } catch (e) {
          console.error('[Verify] Failed to parse Subject as JSON:', e.message);
          console.error('[Verify] Subject content:', subjectRaw);
          throw new Error('Invalid JSON in Subject field: ' + e.message);
        }
        
        // Log the extracted metadata object for debugging
        console.log('[Verify] Extracted Metadata Object:', factsData);
        
        // Extract data EXCLUSIVELY from parsed JSON object (source of truth)
        storedSeal = factsData.seal;
        parsedName = factsData.name || '(name not in metadata)';
        parsedEmail = factsData.email || '(not stored)';
        parsedTime = factsData.timestamp;
        parsedOrganization = factsData.organization || '';
        parsedJobTitle = factsData.jobTitle || '';
        parsedDocumentId = factsData.documentId || '';

        fileNameEl.textContent   = file.name;
        metaName.textContent     = parsedName;
        metaEmail.textContent    = parsedEmail;
        // Display timestamp in user-friendly format, but keep raw ISO for HMAC
        try {
          metaTime.textContent = new Date(parsedTime).toLocaleString();
        } catch (e) {
          metaTime.textContent = parsedTime;
        }
        
        // Show additional metadata from JSON if available
        const extraInfo = [];
        if (parsedOrganization) extraInfo.push(`Organization: ${parsedOrganization}`);
        if (parsedJobTitle) extraInfo.push(`Title: ${parsedJobTitle}`);
        if (parsedDocumentId) extraInfo.push(`Doc ID: ${parsedDocumentId}`);
        metaProducer.textContent = producer + (extraInfo.length ? ' | ' + extraInfo.join(' | ') : '');
        
        // Log the extracted metadata for debugging
        console.log('[Verify] Organization:', parsedOrganization);
        console.log('[Verify] Job Title:', parsedJobTitle);
        console.log('[Verify] Document ID:', parsedDocumentId);

        metaTable.style.display = '';
        sealBlock.style.display = '';
        storedSealEl.textContent = storedSeal;
        console.log('[Verify] Stored Seal:', storedSeal);

        // Show URL seal row if present
        if (targetSeal) {
          urlSealRow.style.display = 'flex';
          urlSealEl.textContent     = targetSeal;
        }

        refreshBtn();

        // ── Auto-verify if both PIN and seal are in the URL ───────────
        if (targetPin && targetSeal) {
          console.log('[Verify] Auto-verification triggered — URL has pin + seal.');
          setTimeout(() => runVerification(targetPin), 150);
        }
      } catch (err) {
        console.error('[Verify] triggerLoad error:', err);
        fileNameEl.textContent = `Error: ${err.message}`;
      }
    }

    /* ════════════════════════════════════════════════════════════
       7. Run full verification logic.
       Re-clones pdfBytes to create two more independent buffers:
         Clone C → recalculateSeal (SubtleCrypto)
         Clone D → kept for any future operations
    ════════════════════════════════════════════════════════════ */
    async function runVerification(pin) {
      console.log('[Verify] runVerification called with pin:', pin);

      if (!pdfBytes) {
        console.warn('[Verify] pdfBytes is null — cannot verify.');
        return;
      }
      if (!storedSeal) {
        console.warn('[Verify] storedSeal is null — cannot verify.');
        return;
      }
      if (!pin) {
        console.warn('[Verify] No PIN provided.');
        return;
      }

      // Clear old verification messages before showing new results
      calcSealEl.textContent = '—';
      matchFileEl.textContent = '';
      matchFileEl.className = 'match-icon match-null';
      matchMetaEl.textContent = '';
      matchMetaEl.className = 'match-icon match-null';
      matchUrlEl.textContent = '';
      matchUrlEl.className = 'match-icon match-null';
      resultBanner.classList.remove('visible', 'banner-green', 'banner-red');

      verifyBtn.disabled = true;

      try {
        // Re-derive independent ArrayBuffer from pdfBytes and clone it
        const pdfByteOffset = pdfBytes.byteOffset;
        const pdfByteLength = pdfBytes.length;
        const sourceBuffer  = pdfBytes.buffer;

        console.log('[Verify] pdfBytes info — byteOffset:', pdfByteOffset, '| length:', pdfByteLength);

        if (!sourceBuffer)
          throw new Error('pdfBytes underlying ArrayBuffer is missing or detached.');

        // Debug: confirm buffer exists before slicing
        console.log('Buffer loaded:', sourceBuffer);

        const cloneForSeal = sourceBuffer.slice(pdfByteOffset, pdfByteOffset + pdfByteLength);

        console.log('[Verify] Recalculating seal with cloneForSeal byteLength:', cloneForSeal.byteLength);
        console.log('Original Seal in PDF:', storedSeal);
        console.log('Verification PIN used:', pin);
        
        // Build data object from parsed JSON (source of truth)
        // Extract all fields individually to avoid any scoping issues
        const name = parsedName || '';
        const email = parsedEmail || '';
        const organization = parsedOrganization || '';
        const jobTitle = parsedJobTitle || '';
        const timestamp = parsedTime || '';
        const docId = parsedDocumentId || '';
        
        const verifyData = {
          name: name,
          email: email,
          organization: organization,
          jobTitle: jobTitle,
          timestamp: timestamp,
          documentId: docId
        };

        const recalculatedSeal = await recalculateSeal(pin, verifyData);

        console.log('[Verify] Recalculated seal:', recalculatedSeal);
        console.log('[Verify] Stored seal:     ', storedSeal);

        // Update display
        storedSealEl.textContent = storedSeal;
        calcSealEl.textContent   = recalculatedSeal;

        // Three-way comparison
        const sealVsStored = recalculatedSeal === storedSeal;

        matchFileEl.textContent = sealVsStored ? '\u2713' : '\u2717';
        matchFileEl.className    = 'match-icon ' + (sealVsStored ? 'match-yes' : 'match-no');

        matchMetaEl.textContent = '\u2713';
        matchMetaEl.className   = 'match-icon match-yes';

        let urlMatch = null;
        if (targetSeal) {
          urlMatch = recalculatedSeal === targetSeal;
          matchUrlEl.textContent = urlMatch ? '\u2713' : '\u2717';
          matchUrlEl.className   = 'match-icon ' + (urlMatch ? 'match-yes' : 'match-no');
          urlSealRow.style.display = 'flex';
        }

        // Determine result
        resultBanner.classList.remove('banner-green', 'banner-red');

        if (sealVsStored && urlMatch !== false) {
          const fullyLinked = urlMatch === true;
          resultBanner.classList.add('banner-green', 'visible');
          resultIcon.textContent  = '\u2713';
          resultLabel.textContent = fullyLinked ? 'AUTHENTIC + LINKED' : 'VERIFIED';
          resultSub.textContent  = fullyLinked
            ? `All three seals match — document is 100% authentic and linked to this URL.`
            : `PIN verified. Digital Seal matches. Document integrity confirmed.`;
        } else {
          resultBanner.classList.add('banner-red', 'visible');
          resultIcon.textContent  = '\u2717';
          resultLabel.textContent = 'TAMPERED OR WRONG PIN';
          const parts = [];
          if (!sealVsStored) parts.push(`Seal\u2260Metadata seal`);
          if (urlMatch === false) parts.push(`Seal\u2260URL seal`);
          resultSub.textContent = parts.join(' | ') +
            ` — either the document was altered or the PIN entered is incorrect.`;
        }
      } catch (err) {
        console.error('[Verify] runVerification error:', err);
        calcSealEl.textContent = `Error: ${err.message}`;
      } finally {
        verifyBtn.disabled = false;
      }
    }

    /* ── Verify button click ───────────────────────────────────── */
    verifyBtn.addEventListener('click', async () => {
      if (!pdfBytes || !storedSeal) return;
      const pin = fPin.value.trim();
      if (!pin) {
        resultBanner.classList.remove('banner-green', 'banner-red');
        resultBanner.classList.add('banner-red', 'visible');
        resultIcon.textContent  = '\u2717';
        resultLabel.textContent = 'NO PIN';
        resultSub.textContent   = 'Please enter the same PIN used to sign the document.';
        return;
      }
      await runVerification(pin);
    });

    /* ── Clear ──────────────────────────────────────────────────── */
    clearBtn.addEventListener('click', () => {
      fileInput.value = '';
      fPin.value = '';
      pdfBytes    = null;
      storedSeal  = null;
      parsedName  = null;
      parsedEmail = null;
      parsedTime  = null;
      parsedOrganization = null;
      parsedJobTitle = null;
      parsedDocumentId = null;

      fileNameEl.textContent  = 'No file selected';
      metaTable.style.display = 'none';
      sealBlock.style.display = 'none';
      urlSealRow.style.display = 'none';
      resultBanner.classList.remove('visible', 'banner-green', 'banner-red');
      verifyBtn.disabled = true;
    });
  </script>

</body>
</html>
